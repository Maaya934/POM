<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돈의 심리학 — 단어 훈련</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--border:#E2E0D8;--border-strong:#C8C5BA;
  --text:#1A1916;--text-2:#6B6860;--text-3:#A09D96;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --font:-apple-system,sans-serif;--mono:monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
.container{max-width:680px;margin:0 auto}
.site-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.site-title{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.site-sub{font-size:12px;color:var(--text-3);font-family:var(--mono)}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem}
.tab{padding:7px 16px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-2);cursor:pointer;transition:all 0.15s}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.progress-section{margin-bottom:1.5rem}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-meta span{font-size:12px;color:var(--text-3);font-family:var(--mono)}
.progress-track{height:3px;background:var(--border);border-radius:2px}
.progress-fill{height:3px;background:var(--green);border-radius:2px;transition:width 0.5s}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-n{font-size:24px;font-weight:600;font-family:var(--mono);letter-spacing:-0.03em}
.stat-l{font-size:11px;color:var(--text-3);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:12px}
.day-badge{display:inline-block;font-size:11px;font-weight:500;font-family:var(--mono);padding:3px 10px;border-radius:20px;margin-bottom:14px;letter-spacing:0.04em}
.badge-weekday{background:var(--green-light);color:var(--green-dark)}
.badge-friday{background:var(--amber-light);color:var(--amber)}
.section-label{font-size:11px;color:var(--text-3);font-family:var(--mono);margin-bottom:8px;letter-spacing:0.06em;text-transform:uppercase}
.word-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.chip{font-family:var(--mono);font-size:13px;font-weight:500;padding:5px 12px;background:var(--bg);border:1px solid var(--border-strong);border-radius:6px;color:var(--text)}
.divider{height:1px;background:var(--border);margin:1.25rem 0}
.sentence-item{margin-bottom:1.25rem}
.s-num{font-size:11px;font-family:var(--mono);color:var(--text-3);margin-bottom:5px}
.ko-sentence{font-size:14px;line-height:1.65;color:var(--text-2);padding:10px 14px;background:var(--bg);border-radius:8px;border-left:2px solid var(--green);margin-bottom:8px}
textarea{width:100%;font-family:var(--font);font-size:14px;line-height:1.6;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;resize:vertical;min-height:58px;transition:border-color 0.15s}
textarea:focus{outline:none;border-color:var(--green)}
textarea::placeholder{color:var(--text-3)}
.btn-primary{display:inline-flex;align-items:center;gap:6px;margin-top:1.25rem;padding:10px 22px;background:var(--green);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary:disabled{background:var(--border);color:var(--text-3);cursor:not-allowed}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;margin-top:1rem;padding:10px 22px;background:transparent;color:var(--text);border:1px solid var(--border-strong);border-radius:8px;font-family:var(--font);font-size:14px;cursor:pointer}
.btn-secondary:hover{background:var(--bg)}
.feedback-item{border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:10px}
.feedback-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.status-pill{font-size:11px;font-weight:500;font-family:var(--mono);padding:2px 8px;border-radius:20px}
.pill-ok{background:var(--green-light);color:var(--green-dark)}
.pill-check{background:var(--amber-light);color:var(--amber)}
.pill-no{background:var(--red-light);color:var(--red)}
.target-word{font-size:12px;font-family:var(--mono);color:var(--text-3)}
.user-answer{font-size:13px;color:var(--text-2);font-style:italic;padding:7px 11px;background:var(--bg);border-radius:6px;margin-bottom:8px}
.ko-hint{font-size:13px;color:var(--text-3);padding:7px 11px;background:var(--bg);border-radius:6px;margin-bottom:0}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:var(--text-2)}
.cal-title{font-size:14px;font-weight:500;font-family:var(--mono)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:11px;color:var(--text-3);text-align:center;padding:4px 0;font-family:var(--mono)}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;position:relative}
.cal-day.has-session{background:var(--green-light);color:var(--green-dark);cursor:pointer;font-weight:500}
.cal-day.has-session:hover{background:#9FE1CB}
.cal-day.today{box-shadow:0 0 0 1.5px var(--green)}
.cal-day.empty{color:var(--text-3)}
.word-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.word-row:last-child{border-bottom:none}
.word-en{font-family:var(--mono);font-size:13px;font-weight:500;min-width:140px;flex-shrink:0}
.back-btn{background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-bottom:1rem}
</style>
</head>
<body>
<div class="container">
  <header class="site-header">
    <span class="site-title">돈의 심리학 — 단어 훈련</span>
    <span class="site-sub" id="headerDate"></span>
  </header>
  <div class="tabs">
    <button class="tab active" id="tab-btn-study" onclick="showTab('study')">오늘 학습</button>
    <button class="tab" id="tab-btn-history" onclick="showTab('history')">학습 기록</button>
  </div>
  <div id="tab-study">
    <div class="progress-section">
      <div class="progress-meta">
        <span id="progressLabel">로딩 중...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">전체 단어</div></div>
      <div class="stat"><div class="stat-n" id="statDone">—</div><div class="stat-l">학습 완료</div></div>
      <div class="stat"><div class="stat-n" id="statWrong">—</div><div class="stat-l">복습 대기</div></div>
    </div>
    <div class="card" id="quizCard">
      <span class="day-badge badge-weekday" id="dayBadge">로딩 중</span>
      <div class="section-label">오늘의 단어</div>
      <div class="word-chips" id="wordChips"></div>
      <div class="divider"></div>
      <div id="sentencesArea"></div>
      <button class="btn-primary" id="submitBtn" onclick="submitAnswers()" disabled>첨삭 받기 →</button>
    </div>
    <div class="card" id="feedbackCard" style="display:none">
      <div class="section-label" style="margin-bottom:14px">제출 결과</div>
      <div id="feedbackArea"></div>
      <button class="btn-secondary" onclick="nextSession()">다음 세트 →</button>
    </div>
  </div>
  <div id="tab-history" style="display:none">
    <div id="calView">
      <div class="card">
        <div class="cal-header">
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">←</button>
            <span class="cal-title" id="calTitle"></span>
            <button onclick="changeMonth(1)">→</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <p style="font-size:12px;color:var(--text-3);margin-top:8px;text-align:center">학습한 날짜를 클릭하면 결과를 볼 수 있어요</p>
    </div>
    <div id="sessionView" style="display:none"></div>
  </div>
</div>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getFirestore, doc, getDoc, setDoc} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {apiKey:"AIzaSyDv0y67GcZpEUrZc5A8qxdbHigoTd35kAA",authDomain:"homework-fb10d.firebaseapp.com",projectId:"homework-fb10d",storageBucket:"homework-fb10d.firebasestorage.app",messagingSenderId:"1086635951672",appId:"1:1086635951672:web:87261474359372356ac8cd"};
const db = getFirestore(initializeApp(FB));

const S = {"insecurity":"새 직장에 적응하는 동안, 그녀는 겉으론 자신 있어 보였지만 속으론 늘 흔들렸다.","apropos of nothing":"회의가 거의 끝나갈 무렵, 그는 갑자기 아무 맥락도 없이 어린 시절 여행 이야기를 꺼냈다.","cackling":"그들은 사무실 복도에서 누군가의 실수담을 듣고 참지 못하고 웃음을 터뜨렸다.","shattered":"몇 년간 공들여 쌓아온 사업 계획이 단 하나의 결정으로 완전히 무너졌다.","incredulously":"그 숫자를 들은 투자자는 도저히 믿기지 않는다는 표정으로 되물었다.","low-key":"그는 수십억 자산가였지만 동네 식당에서 조용히 밥을 먹는 삶을 택했다.","baffled":"전문가들조차 그 시장의 갑작스러운 반등을 도무지 이해할 수 없었다.","illiquid assets":"부동산이나 사모펀드처럼 당장 현금화하기 어려운 자산은 갑작스러운 위기에 취약하다.","foreclosure auction":"몇 달째 대출 이자를 내지 못한 끝에, 그 집은 결국 법원 경매에 넘어갔다.","financial outcomes":"동일한 수익률이라도 언제 투자를 시작했느냐에 따라 결과가 크게 달라진다.","life expectancy":"의학 기술의 발달로 우리가 노후를 준비해야 하는 기간이 과거보다 훨씬 길어졌다.","scoop up":"주가가 급락하자 기관 투자자들은 재빠르게 저가 주식을 대거 사들였다.","virtually":"스마트폰 하나로 사실상 모든 금융 업무를 처리할 수 있는 세상이 됐다.","compelling evidence":"규제 당국은 해당 기업의 분식회계를 입증할 확실한 증거를 확보했다.","agony":"투자한 종목이 반토막 나는 걸 지켜봐야 하는 고통은 경험해본 사람만이 안다.","imperil":"한 곳에만 몰아넣은 투자는 예상치 못한 충격이 왔을 때 가족 전체의 생계를 위협할 수 있다.","revolve around":"그의 하루 일과는 온통 포트폴리오 점검과 뉴스 확인을 중심으로 돌아갔다.","rebuttal":"발표가 끝나자마자 한 애널리스트가 핵심 가정에 정면으로 반박하는 주장을 내놓았다.","affect":"금리 변동은 대출이 있는 모든 가계에 직접적인 영향을 미친다.","effect":"정책 변화가 시장에 미친 효과는 예상보다 훨씬 느리게 나타났다.","basking":"첫 투자에서 큰 수익을 낸 그는 한동안 그 성공에 도취해 있었다.","inwardly":"회의에서 그의 계획이 채택됐을 때, 그는 겉으론 평온한 척했지만 속으로는 환호했다.","genuinely":"그 멘토는 자신의 실패담을 꾸밈없이 진심으로 털어놓았다.","come across as":"지나치게 조심스러운 투자 성향은 때로 기회를 두려워하는 사람처럼 보일 수 있다.","complacent":"몇 년간 수익이 좋았다고 해서 위험 관리를 게을리하면 안 된다.","incinerators":"도시에서 나오는 쓰레기를 처리하기 위해 고온 소각 시설을 늘리는 방안이 논의됐다.","outrageous":"그 수수료율은 업계 평균의 세 배로, 누가 봐도 말도 안 되는 수준이었다.","atrocious":"고객 서비스가 너무 형편없어서 불만 접수가 하루에 수백 건씩 쏟아졌다.","hit it big":"작은 아이디어로 시작한 그 스타트업이 5년 만에 대박을 터뜨렸다.","by and large":"세부적인 차이는 있지만, 대체로 장기 투자자들이 단기 투자자보다 안정적인 수익을 낸다.","strain":"갑작스럽게 늘어난 지출은 가계 재정에 심각한 부담을 주기 시작했다.","crippling debt":"20대에 감당하기 힘든 학자금 빚을 진 그는 오랫동안 저축조차 할 수 없었다.","entitle":"일정 기간 근무하면 직원들은 성과급과 유급 휴가를 받을 자격이 주어진다.","proper":"임시방편이 아닌 제대로 된 은퇴 계획을 세우려면 20대부터 시작해야 한다.","dignified":"누구나 노년에 스스로를 존중받는다고 느낄 수 있는 삶을 누릴 자격이 있다.","reiterate":"그는 강연 말미에 분산 투자의 중요성을 다시 한번 강조하며 마무리했다.","saving vehicle":"개인형 퇴직연금은 세금 혜택까지 갖춘 대표적인 노후 대비 저축 수단이다.","wing it":"데이터도 없이 감으로만 투자 결정을 내리는 건 도박이나 다름없다.","acclimate":"해외에서 일하게 된 그는 현지 금융 시스템과 생활 방식에 익숙해지는 데 몇 달이 걸렸다.","petition":"주민들은 재개발 계획에 반대하며 시의회에 공식적으로 이의를 제기했다.","proceeds":"자선 경매에서 나온 수익금 전액은 지역 청소년 교육 기금으로 전달됐다.","rummage sale":"동네 주민들이 모여 오래된 물건을 파는 행사를 통해 꽤 쏠쏠한 수익을 올렸다.","hooked up":"그 시절 컴퓨터 동아리 학생들은 학교 서버에 연결된 단말기로 프로그래밍을 배웠다.","couldn't get enough of":"그는 경제 역사 책이라면 밤새 읽어도 질리지 않았다.","hit it off":"투자자와 창업자는 첫 미팅에서 바로 서로의 철학이 통한다는 걸 느꼈다.","staggeringly":"그 펀드의 누적 수익률은 놀라울 만큼 높아, 시장 평균을 몇 배나 웃돌았다.","head start":"어릴 때부터 금융 교육을 받은 아이들은 성인이 됐을 때 훨씬 유리한 출발선에 선다.","household name":"그 투자회사는 불과 10년 만에 업계에서 모르는 사람이 없는 브랜드가 됐다.","prodigy":"열다섯 살에 주식 시장을 분석하던 그 소년은 업계의 신동으로 불렸다.","by his own account":"그 투자가는 자신의 회고록에서 스스로 밝혔듯이, 초기 성공의 절반은 운이었다고 했다.","by any measure":"어떤 기준으로 봐도 그의 포트폴리오 성과는 업계 최상위권에 속했다.","reminiscing":"은퇴한 그는 처음 주식을 샀던 날을 떠올리며 잠시 추억에 잠겼다.","trails off":"그는 그 투자 실패에 대해 설명하다가 말끝을 흐리며 더 이상 말을 잇지 못했다.","implicitly":"그 계약서에는 명시되지 않았지만, 양측 모두 암묵적으로 리스크를 나누기로 했다.","predominantly":"그 펀드의 포트폴리오는 주로 아시아 신흥시장 주식으로 구성되어 있었다.","by sheer chance":"두 사람이 같은 세미나에서 우연히 만난 것이 평생의 사업 파트너십으로 이어졌다.","acknowledge":"그 CEO는 실적 발표에서 지난 분기의 실패를 솔직하게 인정했다.","chalk up":"그 손실을 값비싼 수업료로 돌리고, 다음 투자에 그 교훈을 적용했다.","traits":"성공한 장기 투자자들에게서 공통적으로 발견되는 특성이 몇 가지 있다.","emulate":"많은 초보 투자자들이 워런 버핏의 방식을 그대로 따라 하려 한다.","pin down":"그 위기의 정확한 원인을 딱 잘라 특정하기가 쉽지 않았다.","transaction":"모든 금융 거래 내역은 자동으로 기록되어 언제든지 확인할 수 있다.","to hell with it":"몇 달을 망설이다가 그는 결국 에라 모르겠다는 심정으로 창업 신청서를 제출했다.","flout":"일부 대형 투자자들은 공시 의무를 노골적으로 무시하며 불공정 거래를 일삼았다.","scrappy":"자금이 부족했지만 그 팀은 근성 하나로 대기업과 맞붙어 시장을 뚫었다.","visionary":"그 창업자는 남들이 아직 보지 못하는 10년 후를 내다보는 안목을 가졌다.","flagrant":"그 회사의 회계 조작은 너무나 노골적이어서 첫 감사에서 바로 드러났다.","circumventing":"일부 기업들은 규제를 정면으로 위반하는 대신 교묘하게 우회하는 방식을 택했다.","laid out":"그 보고서는 투자 리스크 요인들을 항목별로 체계적으로 정리해 제시했다.","supremely shrewd":"그는 협상에서 놀라울 만큼 영리하게 움직여 누구도 예상하지 못한 조건을 끌어냈다.","shrewd":"그 투자자는 남들이 공포에 떨 때 오히려 영리하게 저점 매수를 단행했다.","point in":"지금 시점에서 그 결정을 후회해봤자 아무 의미가 없다.","fall in your favor":"시장 상황이 예상대로 흘러가면 이 포지션은 당신에게 유리하게 작용할 것이다.","eloquence":"그 경제학자는 복잡한 개념을 누구나 이해할 수 있는 언어로 설명하는 능력이 탁월했다.","entail":"장기 투자는 단기적인 손실을 견뎌내는 인내심을 반드시 필요로 한다.","third base":"부유한 가정에서 태어났다는 것 자체가 이미 유리한 위치에서 시작하는 것과 같다.","unfathomable":"복리로 70년간 불어난 자산 규모는 직관적으로는 도저히 가늠하기 어렵다.","by all accounts":"모든 사람의 평가를 종합해보면, 그는 업계에서 가장 신뢰받는 인물이다.","alleged":"당국은 내부자 거래를 했다는 의혹을 받는 임원을 조사 중이라고 밝혔다.","irrevocably":"그 결정은 한번 내려지면 돌이킬 수 없이 회사의 방향을 바꿔놓았다.","swindle":"그는 은퇴 자금을 모두 사기 투자 상품에 빼앗겼다.","endeavor":"재정적 독립을 이루려는 노력은 단기간에 완성되는 게 아니라 평생에 걸친 과정이다.","siphons away":"과도한 수수료는 매년 조금씩 투자 수익을 조용히 갉아먹는다.","securities":"그 포트폴리오는 주식, 채권 등 다양한 유가증권으로 구성되어 있었다.","leave on the table":"협상에서 너무 서두르면 충분히 얻을 수 있었던 이익을 그냥 흘려보내게 된다.","resort to":"현금 흐름이 막히자 그 기업은 결국 단기 차입에 의존할 수밖에 없었다.","phenomenal":"그 스타트업의 첫 해 성장률은 업계 모두를 놀라게 할 만큼 경이로웠다.","ravenous":"오랜 침체 끝에 시장이 반등하자 투자자들의 매수 욕구는 걷잡을 수 없이 달아올랐다.","perpetual":"물가는 끊임없이 오르기 때문에 현금만 보유하는 것은 장기적으로 손해다.","exacerbate":"금리 인상은 이미 어려운 부동산 시장의 상황을 더욱 악화시켰다.","you're off the races":"첫 투자 수익이 나기 시작하자 그때부터 그의 복리 여정은 본격적으로 궤도에 올랐다.","acumen":"그녀는 숫자보다 사람과 시장의 흐름을 읽는 탁월한 사업 감각으로 성공했다.","pubescent":"십대 시절에 경제 개념을 접한 아이들이 성인이 됐을 때 더 나은 재정 결정을 내린다.","geriatric":"고령 환자들의 의료 수요가 늘어나면서 관련 산업에 대한 투자 관심도 높아졌다.","impractical":"그 계획은 이론적으로는 훌륭했지만 현실에서 실행하기엔 너무 비현실적이었다.","exponential":"스마트폰 보급 이후 모바일 결제 시장은 기하급수적으로 성장했다.","swinging for the fences":"안정적인 수익보다 한 방을 노리는 투자 전략은 대부분 실패로 끝난다.","commodity":"금, 원유처럼 어디서나 동일한 품질로 거래되는 상품은 가격 경쟁이 치열하다.","wrap your head around":"복리의 장기 효과는 설명을 들어도 처음엔 직관적으로 이해하기가 쉽지 않다.","one-off hits":"그 투자 회사의 역사를 보면 대부분의 수익은 몇 번의 탁월한 선택에서 나왔다.","frugality":"그 억만장자는 평생 절약하는 습관을 유지하며 불필요한 지출을 극도로 경계했다.","cement":"몇 년간의 꾸준한 실적이 그 펀드의 업계 내 입지를 단단하게 굳혔다.","distraught":"투자금 전액을 잃었다는 소식을 들은 그는 완전히 넋이 나간 상태였다.","in a stroke of luck":"한 번의 운 좋은 기회가 그의 재정적 삶을 완전히 바꿔놓았다.","blowout":"예상을 훨씬 뛰어넘는 실적 발표에 주가가 하루 만에 30% 폭등했다.","over one's head":"그는 자신의 지식과 경험으로는 감당하기 어려운 복잡한 파생상품에 손을 댔다.","wind up":"처음엔 단기 투자로 시작했지만 결국 10년 넘게 그 종목을 보유하게 됐다.","set out":"그는 서른 살에 50세 전에 재정적 독립을 이루겠다는 목표를 세우고 실천에 나섰다.","rest on our laurels":"작년 성과가 좋았다고 해서 올해 노력을 게을리하면 안 된다.","sully":"단 한 번의 내부자 거래 스캔들이 수십 년간 쌓아온 기업의 명성을 한순간에 더럽혔다.","acutely":"그는 자신의 결정이 직원들의 생계에 미칠 영향을 매우 예민하게 의식하고 있었다.","gnaw at":"언제 시장이 무너질지 모른다는 불안감이 그를 내내 갉아먹었다.","havoc":"예상치 못한 금리 급등은 채권 시장에 엄청난 혼란을 일으켰다.","ensue":"대형 은행의 파산 소식이 전해지자 패닉 매도가 뒤따랐다.","redundant":"자동화로 인해 일부 반복 업무는 더 이상 사람이 할 필요가 없어졌다.","in the face of":"극심한 시장 변동성 속에서도 그는 흔들리지 않고 장기 투자 원칙을 지켰다.","adversity":"투자에서 어려움은 피할 수 없는 것이며, 그것을 어떻게 견디느냐가 결과를 가른다.","tangible":"그 투자의 결실은 추상적인 수치가 아니라 실제로 만질 수 있는 자산으로 나타났다.","belabor":"이미 모두가 동의한 사항을 굳이 길게 반복할 필요는 없다.","effectively":"그 헤지 전략은 시장 급락 시 손실을 사실상 절반으로 줄이는 효과를 냈다.","subset":"전체 투자자 중 일관된 초과 수익을 내는 집단은 극히 일부에 불과하다.","converge upon":"전문가들의 의견이 점점 하나의 결론으로 모아지기 시작했다.","stupendously":"그 스타트업의 기업 가치는 믿기 어려울 만큼 놀랍게 급등했다.","put on the map":"그 작은 나라는 혁신적인 핀테크 정책으로 글로벌 금융 시장에서 주목받게 됐다.","full-blown":"경기 침체 조짐이 보이던 것이 결국 전면적인 금융 위기로 번졌다.","bonanza":"원자재 가격 급등은 자원 수출국들에게 예상치 못한 횡재나 다름없었다.","dud":"그 분기 실적은 기대와 달리 완전한 실망작이었다.","thumping":"선거 결과 예상을 뒤엎고 집권당이 압도적인 차이로 승리했다.","fly-by-night":"투자자들은 신뢰할 수 없는 유령 같은 업체에 소중한 돈을 맡기지 말아야 한다.","measure":"성공을 오직 수익률로만 평가하는 것은 투자의 본질을 놓치는 것이다.","churn out":"그 출판사는 질보다 양을 앞세워 경제 관련 책들을 쉴 새 없이 찍어냈다.","commanding a market cap":"그 기업은 업계에서 독보적인 시가총액을 자랑하며 선두 자리를 굳혔다.","flop":"기대를 모았던 신제품 출시가 시장에서 완전히 외면받으며 참패했다.","offset":"배당 수익이 주가 하락으로 인한 손실을 어느 정도 상쇄해줬다.","wins by a mile":"비용 구조와 브랜드 인지도 모든 면에서 그 기업이 경쟁사를 압도적으로 앞선다.","punctuated":"그의 투자 인생은 큰 성공들 사이사이에 뼈아픈 실패들이 간간이 끼어 있었다.","horrendous":"그 분기 실적 보고서는 예상보다 훨씬 끔찍한 수치를 담고 있었다.","acted upon":"정보를 알고 있다고 해서 실제로 행동으로 옮기지 않으면 아무 소용이 없다.","blip":"그 일시적인 하락은 장기 차트에서 보면 아주 작은 점에 불과했다.","incur":"불필요한 거래를 반복하면 수수료와 세금으로 인한 비용이 쌓이게 된다.","by design":"그 포트폴리오는 우연이 아니라 의도적으로 분산 투자를 원칙으로 설계됐다.","preemptively":"위기가 닥치기 전에 미리 현금 비중을 높여두는 것이 현명한 대비책이다.","stick out":"그 기업의 재무제표는 동종 업계에서 이상할 정도로 두드러지게 좋아 보였다.","denominator":"평균 수익률이 좋아 보여도 분모가 되는 전체 투자 건수를 함께 봐야 한다.","chronically":"그 가계는 지출이 수입을 지속적으로 초과하는 구조적인 문제를 안고 있었다.","dependable":"시장이 어떻게 움직이든 꾸준히 배당금을 지급하는 기업은 믿을 수 있는 투자처다.","predictor":"과거 수익률은 미래 성과를 예측하는 지표로서 생각보다 신뢰도가 낮다.","intrinsic":"그는 주가가 아닌 기업이 본질적으로 가진 가치에 집중해 투자 판단을 내렸다.","score":"그 신용평가사는 해당 기업의 재무 건전성을 낮은 점수로 평가했다.","reactance":"사람들은 선택의 자유가 제한됐다고 느낄 때 오히려 반발심에 반대 행동을 하려는 경향이 있다.","gig":"플랫폼 경제의 성장으로 단기 계약 중심의 일자리 형태가 빠르게 늘어나고 있다.","conceivable":"어떤 상황도 상상 가능한 시나리오로 대비해두는 것이 리스크 관리의 기본이다.","recluse":"그 억만장자는 대중 앞에 거의 나타나지 않는 철저한 은둔자로 알려져 있었다.","refinery":"원유 가격이 오르자 정유 시설을 보유한 기업들의 수익성도 함께 개선됐다.","have one's ear":"그 로비스트는 정책을 결정하는 핵심 인물들에게 직접 영향력을 행사할 수 있는 위치에 있었다.","gawk":"젊은 직원들은 회의실 안에서 쏟아지는 억 단위 숫자들을 넋을 잃고 바라봤다.","repossess":"대출금을 갚지 못하자 금융기관이 담보로 잡힌 차량을 가져갔다.","default on":"그 기업은 만기가 된 사채 이자를 지급하지 못해 채무불이행 상태에 빠졌다.","morsel":"뉴스에서 흘러나오는 단편적인 정보만으로 전체 시장을 판단하는 건 위험하다.","brokerage statements":"분기마다 도착하는 증권 계좌 명세서를 꼼꼼히 확인하는 습관이 필요하다.","gauge":"그 지표는 소비자들의 실제 구매 심리를 가늠하는 데 활용된다.","vigorous":"그 규제 기관은 불법 거래 관행에 대해 강력하고 단호한 조사를 벌였다.","accrue":"복리 투자는 시간이 흐를수록 이자 위에 이자가 쌓이는 구조다.","ingrain":"어릴 때부터 저축하는 습관을 몸에 밴 사람은 성인이 돼서도 재정 관리를 잘한다.","restraint":"시장이 과열됐을 때 욕심을 억누르고 절제할 줄 아는 투자자가 결국 살아남는다.","insolvency":"과도한 레버리지는 작은 손실에도 지급 불능 상태로 이어질 수 있다.","shroud":"그 펀드의 운용 전략은 철저히 베일에 싸여 외부에서 알 수 없었다.","bloat":"관료적 조직 구조가 비대해지면 의사결정이 느려지고 비용이 증가한다.","propensity":"일부 투자자들은 손실을 실현하기 싫어서 지는 종목을 계속 들고 있으려는 경향이 있다.","downpayment":"집을 사려면 먼저 전체 가격의 일정 비율을 계약금으로 준비해야 한다.","pounce":"경쟁사가 위기에 빠진 틈을 타 그 기업은 재빠르게 인수를 제안했다.","span":"그의 투자 이력은 여러 경제 사이클과 금융 위기를 가로지르는 긴 세월에 걸쳐 있다.","leeway":"재정적 여유가 있으면 갑작스러운 상황에서도 더 유연하게 대처할 수 있다.","merely":"그 수치는 단순히 평균일 뿐, 개별 투자자의 경험을 반영하지 않는다.","ailment":"만성적인 현금 부족은 기업 재무 건강에 있어 반드시 치료해야 할 고질병이다.","hunch":"데이터보다 막연한 직감만으로 내린 투자 결정은 대부분 후회로 끝난다.","obsolete":"급속도로 변화하는 기술 환경에서 기존 비즈니스 모델은 금세 시대에 뒤처질 수 있다.","placate":"주가 급락 후 경영진은 불안해하는 주주들을 달래기 위해 긴급 설명회를 열었다.","stave off":"신속한 구조조정으로 그 기업은 파산 위기를 가까스로 막아냈다.","nuisance":"잦은 소규모 수수료들이 모이면 무시하기 어려운 골칫거리가 된다.","blunt":"그 애널리스트는 보고서에서 해당 기업의 재무 상태에 대해 직설적으로 혹평했다.","confines":"그는 기존 금융 규제의 테두리 안에서 최대한 창의적인 해법을 찾으려 했다.","taper":"중앙은행은 경기 과열을 막기 위해 채권 매입 규모를 서서히 줄여나갔다.","picked themselves back up":"그 기업은 회사 역사상 최악의 분기를 보낸 후 다시 일어서는 데 2년이 걸렸다.","absurdly":"그 부동산의 매각 가격은 시장 가치에 비해 터무니없이 낮게 책정됐다.","unfazed":"시장이 요동쳐도 그 투자자는 전혀 흔들리지 않고 원래 계획대로 움직였다.","undeterred":"첫 번째 투자가 실패로 돌아갔지만 그는 굴하지 않고 두 번째 기회를 모색했다.","liability":"그 부채는 자산보다 부채 비율이 높아 기업의 재정 상태를 위협하는 요인이었다.","smattering":"그 발표장에는 업계 전문가들과 함께 일반 투자자들도 소수 참석해 있었다.","arithmetic":"복리 수익을 계산할 때 단순한 산수 실수가 수십 년 후 엄청난 차이를 만든다.","the leap of faith":"그 창업가는 안정적인 직장을 버리고 창업에 뛰어드는 것이 일생일대의 도전이라는 걸 알면서도 결단을 내렸다.","unassailable":"그 기업의 시장 지배력은 어떤 경쟁자도 쉽게 넘볼 수 없을 만큼 단단했다.","calibrate":"리스크 허용 범위에 맞게 포트폴리오 비중을 정밀하게 조정하는 과정이 필요하다.","lifeblood":"소비자의 신뢰는 모든 금융 서비스 기업이 살아남기 위한 가장 근본적인 자원이다.","indefinitely":"금리가 지금 수준에서 무기한 유지될 것이라고 가정하는 것은 위험하다.","in their wake":"대형 금융 기관들이 무너진 후, 그 여파로 수많은 중소 투자사들도 연쇄적으로 타격을 입었다.","prompt":"예상치 못한 경제 지표 발표가 중앙은행의 긴급 회의 소집을 촉발했다.","conceive":"그 시절 누가 스마트폰이 지갑을 완전히 대체하게 될 것이라고 상상이나 했겠는가.","cranky":"오랜 시간 손실을 견뎌온 그 투자자는 어떤 뉴스에도 날 선 반응을 보였다.","confiscate":"규제 당국은 불법으로 취득한 수익금을 모두 압수했다.","unprecedented":"2008년 금융위기는 현대 역사에서 전례가 없는 규모의 시장 붕괴였다.","withstand":"그 포트폴리오는 금융 위기의 충격을 버텨낼 만큼 충분히 분산되어 있었다.","turn":"예상치 못한 기술 혁신이 업계 전체의 판도를 뒤바꿨다.","risk-averse":"은퇴가 가까워질수록 투자자들은 대체로 위험을 기피하는 성향으로 바뀐다.","disclosures":"상장 기업은 투자자 보호를 위해 재무 상태를 정기적으로 공시해야 한다.","heavy industry":"그 지역은 철강과 조선을 중심으로 하는 중공업 기반 경제에서 탈피하려 하고 있다.","prone":"레버리지가 높은 투자는 시장 변동에 취약하여 급격한 손실을 볼 가능성이 크다.","boom-and-bust":"원자재 산업은 역사적으로 호황과 불황이 반복되는 사이클을 탄다.","contrarian":"시장의 공포가 극에 달했을 때 오히려 매수하는 역발상 투자자들이 있다.","be wedded to":"그는 과거의 성공 방식에만 집착하여 새로운 시장 변화를 받아들이지 못했다.","render":"금리 급등은 기존의 채권 투자 전략을 사실상 무용지물로 만들어버렸다.","annotated":"그 보고서는 중요한 수치마다 상세한 주석이 달린 형태로 제공됐다.","antiquated":"일부 기업들은 디지털 시대에 맞지 않는 구식 회계 시스템을 아직도 사용하고 있다.","quirk":"그 투자자의 독특한 버릇은 어떤 종목이든 최소 5년은 보유해보고 판단한다는 것이었다.","rebut":"회사 측은 부정적인 애널리스트 보고서의 내용 하나하나를 데이터로 반박했다.","in time":"당장은 손해처럼 보여도 결국 시간이 지나면 그 결정이 옳았음을 알게 된다.","takeaway":"그 강연에서 얻은 가장 핵심적인 교훈은 감정이 아닌 원칙으로 투자해야 한다는 것이었다.","nuance":"투자 결정에는 단순한 공식보다 상황에 따른 미묘한 판단력이 필요하다.","decent chance":"지금 시장 상황을 보면 내년 금리 인하 가능성이 상당히 높다고 볼 수 있다.","bring down":"과도한 차입 경영은 결국 기업 전체를 무너뜨리는 원인이 됐다.","redundancy":"여러 개의 수입원을 가지는 것은 한 가지가 끊겼을 때를 대비한 안전장치가 된다.","crapshoot":"단기 주가 예측은 결국 운에 맡기는 도박과 다를 게 없다.","pundit":"주가 전망을 자신 있게 단언하는 전문가들의 예측이 얼마나 자주 빗나가는지 살펴볼 필요가 있다.","eventual":"단기적인 손실이 있더라도 장기적으로는 결국 시장이 회복될 것이라는 믿음이 필요하다.","exploit":"그는 시장의 일시적인 비효율을 영리하게 활용해 수익을 냈다.","ample cash":"위기 때 기회를 잡으려면 평소에 충분한 현금을 확보해두는 게 중요하다.","mishap":"사소한 서류 실수가 계약 체결을 몇 주씩 지연시키는 사고로 이어졌다.","ripe":"금리가 안정되고 기업 이익이 회복되면서 시장이 투자하기에 좋은 환경으로 무르익었다.","rule of thumb":"일반적인 경험 법칙에 따르면 비상 자금은 최소 3~6개월치 생활비 수준을 유지하는 게 좋다.","charitable":"그 해석은 회사 측에 지나치게 유리한 방향으로 바라보는 것이었다.","underpinning":"그 경제 성장의 근본적인 토대는 탄탄한 내수 소비였다.","opt to":"그는 보너스를 현금으로 받는 대신 주식으로 받는 쪽을 선택했다.","austere":"긴축 재정 시기에는 불필요한 지출을 줄이고 절약하는 생활방식이 요구된다.","tails off":"초반에 빠르게 성장하던 그 스타트업의 사용자 증가세가 2년차에 들어서며 점차 둔화됐다.","detonate":"그 회계 스캔들은 시장 전체를 뒤흔드는 폭탄이 됐다.","firsthand":"그 투자자는 1997년 아시아 금융위기를 직접 겪으며 위기 대응 능력을 키웠다.","overdue":"구조적인 연금 개혁은 이미 오래전에 이루어졌어야 할 시급한 과제다.","subsequent":"금리 인상 이후 연달아 발표된 데이터들이 경기 둔화를 확인해줬다.","dynastic":"그 재벌 가문은 3대에 걸쳐 부를 세습하며 왕조처럼 군림했다.","sprawling":"그 대기업은 수십 개의 계열사를 거느린 방대한 사업 구조를 갖고 있었다.","entrenched":"기존 대형 금융기관들의 시장 지배력은 워낙 깊이 뿌리내려 있어 쉽게 흔들리지 않는다.","outweigh":"장기적인 복리 효과가 단기적인 변동성 위험보다 훨씬 크다.","upside":"리스크가 큰 만큼 잠재적인 수익 기회도 크다는 점을 고려해야 한다.","taunt":"시장이 폭락할 때 팔지 않고 버텼던 투자자들은 이후 회복을 보며 손절한 이들을 비웃듯 바라봤다.","upheaval":"팬데믹은 전 세계 경제 질서에 전례 없는 대격변을 일으켰다.","law-abiding":"그 기업은 어떤 상황에서도 규정을 철저히 준수하는 원칙을 지켜왔다.","tactical":"단기 시장 상황에 맞춰 자산 배분을 일부 조정하는 전술적 접근이 필요할 때가 있다.","opportune":"금리가 낮고 유동성이 풍부한 지금이 장기 투자를 시작하기에 좋은 시기다.","drawdowns":"투자 전략을 평가할 때는 수익률뿐만 아니라 최대 손실폭도 함께 살펴봐야 한다.","obedient":"그 펀드 매니저는 운용 규정을 맹목적으로 따르다가 정작 중요한 판단을 놓쳤다.","locomotive":"수출 성장이 전체 경제를 이끄는 기관차 역할을 해왔다.","pitch in":"팀원 모두가 힘을 합쳐 마감 전날 밤 함께 보고서를 완성했다.","come due":"미뤄왔던 부채 상환 기한이 다가오자 기업의 현금 흐름에 압박이 가해지기 시작했다.","disposition":"그 투자자의 기본 성향은 위험을 감수하기보다 안전한 자산을 선호하는 쪽이었다.","implosion":"과도한 레버리지로 유지되던 그 헤지펀드는 결국 내부에서부터 붕괴됐다.","indelible":"그 금융 위기는 그 세대 투자자들의 기억에 지워지지 않는 흔적을 남겼다.","scarce":"위기 상황에서는 유동성이 급격히 말라붙어 현금이 귀해진다.","hindsight":"지나고 나서 돌아보면 그 투자 실패의 징조들이 처음부터 곳곳에 있었다.","spur":"정부의 세제 혜택이 민간 부문의 신규 투자를 촉진하는 역할을 했다.","sober":"잔치 분위기에 들떠있던 시장이 경제 지표 발표 이후 냉정을 되찾았다.","flip":"그는 부동산을 사자마자 리모델링 후 팔아 단기 차익을 노리는 전략을 구사했다.","plunge":"악재가 겹치자 그 주식의 가격이 하루 만에 급격히 떨어졌다.","quaint":"몇십 년 전의 투자 원칙들이 지금 보면 시대에 맞지 않아 다소 낡은 느낌을 준다.","oblivious":"버블이 한창 부풀어 오르는 동안에도 대부분의 투자자들은 위험 신호를 전혀 눈치채지 못했다.","complacency":"오랜 강세장이 이어지면서 위험에 대한 경계심이 서서히 무뎌지기 시작했다.","compelling":"그의 투자 논리는 상대방이 반박하기 어려울 만큼 설득력이 있었다.","flare":"양측의 협상이 결렬되자 갈등이 다시 불거졌다.","reverting":"주가는 극단적으로 오른 후 결국 평균으로 돌아오는 경향이 있다.","ramblings":"그 보고서는 핵심 없이 길게 늘어진 내용들로 가득 차 읽기가 어려웠다.","absurd":"수익도 없는 기업의 주가가 수천 배로 뛰었다는 건 누가 봐도 말이 안 된다.","shrug off":"그 기업은 부정적인 보도에도 아랑곳하지 않고 성장 가도를 이어갔다.","plausible":"그의 경기 전망은 비록 낙관적이지만 충분히 설득력 있는 논거를 갖추고 있었다.","aloof":"경험이 많은 투자자일수록 시장의 소음에서 거리를 두는 태도를 유지한다.","drown out":"합리적인 장기 투자 조언은 단기 수익을 노리는 자극적인 뉴스에 묻혀 들리지 않는다.","imminent":"경기 침체가 임박했다는 신호들이 여러 지표에서 동시에 나타나기 시작했다.","averse":"그 노인 투자자는 원금 손실 가능성이 조금이라도 있는 투자를 극도로 꺼렸다.","asymmetric":"그 투자에서 잠재적 손실은 제한적이지만 이익은 무한정 클 수 있다는 비대칭적 구조가 매력이었다.","barrel":"유가가 배럴당 100달러를 돌파하자 에너지 관련주들이 일제히 강세를 보였다.","gyrations":"그 주식은 실적 발표 시즌마다 극단적인 가격 변동을 반복하는 것으로 유명했다.","afflict":"부채 위기는 해당 국가뿐 아니라 주변국 경제에도 연쇄적인 타격을 줬다.","extrapolate":"최근 몇 년의 성장률을 그대로 미래에 투영하는 방식은 종종 현실과 크게 빗나간다.","creep up":"물가는 눈에 띄지 않게 조금씩 오르다가 어느 순간 체감 부담이 커진다.","fracking":"비전통 방식의 원유 추출 기술이 에너지 시장의 공급 구조를 근본적으로 바꿔놓았다.","incentivize":"세금 혜택과 보조금은 기업이 친환경 기술에 투자하도록 유도하는 수단이다.","push back":"주주들은 경영진의 무리한 인수합병 계획에 강하게 반발했다.","tinker":"그 투자자는 시장이 흔들릴 때마다 포트폴리오를 자잘하게 조정하다 오히려 손실을 키웠다.","credence":"반복된 예측 적중이 그의 시장 분석에 신뢰를 더해줬다.","prevails":"단기적으로는 감정이 시장을 지배하지만 장기적으로는 기업의 실질 가치가 결국 반영된다.","underscore":"이번 사태는 분산 투자의 중요성을 다시 한번 강조하는 사례가 됐다.","lay people":"금융 지식이 없는 일반인들도 이해할 수 있는 방식으로 설명하는 것이 중요하다.","keep tabs on":"좋은 투자자는 포트폴리오를 구성한 후에도 꾸준히 기업의 변화를 추적한다.","hover":"그 주식은 몇 달째 특정 가격대 주변에서 머물며 방향을 정하지 못하고 있었다.","hustle":"그 창업자는 투자자를 만나고 고객을 설득하며 쉬지 않고 뛰어다녔다.","dumbfound":"그 예상 밖의 인수 발표는 업계 모두를 어리둥절하게 만들었다.","prudence":"불확실한 시기일수록 신중하고 보수적인 재정 판단이 더욱 중요해진다.","obliterate":"그 금융 위기는 수많은 개인 투자자들의 노후 자산을 완전히 날려버렸다.","inflict":"잘못된 금융 정책은 사회적 약자에게 더 큰 타격을 입힌다.","potent":"복리의 효과는 시간이 충분히 주어질 때 강력한 힘을 발휘한다.","armistice":"오랜 무역 분쟁 끝에 양국은 일시적인 휴전 협정을 맺고 협상을 재개했다.","stake":"그는 그 스타트업에 상당한 지분을 투자하며 공동 창업자로 참여했다.","predate":"이 투자 원칙은 현대 금융 이론이 등장하기 훨씬 이전부터 존재해왔다.","hasten":"예상보다 빠른 기술 발전이 기존 산업의 쇠퇴를 앞당겼다.","demise":"한때 시장을 이끌던 그 기업은 변화에 적응하지 못하고 결국 몰락했다.","plaster over":"임시방편으로 문제를 덮어버리는 정책은 결국 더 큰 위기를 불러온다.","tribe":"그 온라인 커뮤니티는 비슷한 투자 철학을 가진 사람들이 모여 하나의 집단을 형성했다.","default":"시장에서 많은 투자자들이 아무 생각 없이 기본 설정 옵션을 선택한다.","unequivocally":"그 보고서는 해당 기업의 재무 상태가 매우 양호하다고 명확하게 결론 내렸다.","indispensable":"포트폴리오 관리에서 분산투자는 빠뜨릴 수 없는 핵심 원칙이다.","outright":"그 제안을 완전히 거절하는 대신 조건을 바꿔 재협상을 요청했다.","warp":"확증 편향은 투자 판단을 객관적이지 않게 왜곡시킨다.","be susceptible to":"차입 비율이 높은 기업일수록 금리 변동에 취약하다.","at one's disposal":"정보와 분석 도구를 얼마나 잘 활용하느냐가 투자자의 역량을 가른다.","vagary":"시장의 변덕스러운 움직임에 일일이 반응하다 보면 장기적인 방향을 잃게 된다.","lay out":"그 보고서는 투자 전략의 핵심 원칙들을 단계별로 명확하게 제시했다.","awry":"처음에는 완벽해 보였던 사업 계획이 시행 과정에서 완전히 어긋나기 시작했다.","crude":"정제되지 않은 원유가 배럴당 80달러를 돌파하며 에너지 관련주가 강세를 보였다.","caveat":"그 분석이 흥미롭긴 하지만, 몇 가지 중요한 전제 조건이 충족돼야 한다는 점을 기억해야 한다.","benevolent":"그 재단은 사회 취약계층의 재정 교육을 위해 수십억 원을 기부했다.","assert":"그 투자자는 단기 예측은 무의미하다는 자신의 원칙을 굳게 주장했다.","go out of your way":"그 고객 담당자는 문제를 해결하기 위해 규정을 넘어서서 특별히 노력해줬다.","flashy":"화려한 겉포장의 투자 상품일수록 실제 수익보다 수수료가 높은 경우가 많다.","earmark":"그는 월급의 일부를 노후 대비 자금으로 따로 분리해두는 습관을 들였다.","ruinous":"과도한 레버리지는 작은 시장 충격에도 파멸적인 손실로 이어질 수 있다.","fend off":"그 기업은 경쟁사의 공격적인 가격 전략을 막아내기 위해 자체적인 할인 행사를 벌였다.","serene":"그 노련한 투자자는 시장이 폭락하는 상황에서도 평온한 태도를 잃지 않았다.","palliative":"그 정책은 근본 문제를 해결한 게 아니라 임시로 증상만 완화하는 처방이었다.","be adhered to":"일단 세운 투자 원칙은 시장 상황과 관계없이 일관되게 지켜져야 한다.","living well below one's means":"그 부자는 수입에 비해 훨씬 소박하게 생활하며 꾸준히 자산을 불렸다.","toggle":"투자 앱에서 자동 재투자 기능을 켜고 끌 수 있다.","keeping up with the Joneses":"주변 사람들이 비싼 차를 산다고 해서 무리하게 따라 사면 재정 건강이 나빠진다.","on paper":"그 사업 계획은 서류상으로는 완벽해 보였지만 현실에서는 전혀 다른 결과가 나왔다.","halt":"거래소는 주가 급락이 이어지자 일시적으로 거래를 정지시켰다.","grind to a halt":"공급망 붕괴로 인해 생산 라인이 완전히 멈춰버렸다.","budge":"그 매도 호가는 협상 압박에도 전혀 움직이지 않았다.","thrift":"그 세대는 전쟁과 공황을 겪으며 절약이 몸에 밴 삶을 살았다.","diverge from":"그의 투자 방식은 전통적인 가치 투자 접근법에서 점점 멀어졌다.","splurge":"오랫동안 아끼며 살아온 그는 처음으로 고급 레스토랑에서 아낌없이 돈을 썼다.","pent-up":"오랫동안 억눌려 있던 소비 욕구가 봉쇄 해제 후 한꺼번에 폭발했다.","embolden":"초기 투자 성공 경험이 그를 더 큰 규모의 투자에 나설 용기를 갖게 해줬다.","spree":"보너스를 받은 직원들이 연말 쇼핑에 흥청망청 돈을 쏟아부었다.","expenditure":"그 기업의 연구개발 지출이 매출 대비 업계 최고 수준에 달했다.","subsidize":"정부는 전기차 구매를 장려하기 위해 보조금을 지원하기로 했다.","curtail":"비용 절감을 위해 출장과 마케팅 예산을 대폭 줄였다.","substantial":"그 인수합병은 상당한 규모의 자금이 필요한 대형 거래였다.","bleak":"경제 전망 보고서는 내년 성장률에 대해 매우 어두운 그림을 그렸다.","rubble":"한때 번창했던 그 기업은 파산 이후 완전히 잿더미가 됐다.","percentile":"그 펀드의 수익률은 동종 펀드 중 상위 5% 이내에 속한다.","hyperbole":"그 주식 추천 영상은 과장된 수익 전망으로 가득 차 있었다.","surplus":"무역 흑자가 몇 년째 이어지면서 외환보유액이 사상 최대를 기록했다.","rehash":"그 강연은 이미 잘 알려진 내용을 새 포장지에 담아 반복하는 수준에 불과했다.","precipitous":"금리 발표 직후 채권 가격이 가파르게 급락했다.","preposterous":"그 밸류에이션은 어떤 기준으로 봐도 황당하게 높은 수준이었다.","skew":"소수의 극단적 수익 사례가 전체 평균을 크게 왜곡시켰다.","shed":"경기 침체 우려가 커지자 기업들이 잉여 인력을 줄이기 시작했다.","quantitative easing":"중앙은행은 경기 부양을 위해 대규모 채권 매입을 통한 양적 완화에 나섰다.","backstop":"정부의 예금 보호 제도는 금융 시스템 전반을 떠받치는 최후의 안전망이다.","meritocratic":"그 기업은 배경보다 실력으로 승진이 결정되는 능력주의 문화를 자랑했다.","scoff":"전문가들은 처음에 그 투자 아이디어를 코웃음 쳤지만 결과는 정반대였다.","raise it to the power of":"복리 수익을 계산할 때는 수익률을 연수만큼 거듭제곱해야 정확한 값이 나온다.","keenly":"그 애널리스트는 시장의 미세한 변화를 예리하게 포착하는 능력이 있었다."};
const ALL = Object.keys(S);

let st = {remaining:[], done:[], wrong:[], cur:[], ans:[], isFri:false, sessions:{}};
let calY = new Date().getFullYear(), calM = new Date().getMonth();

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dayInfo(){const d=new Date().getDay(),ns=['일','월','화','수','목','금','토'];return d===5?{label:'금요일 복습',isFri:true,cls:'badge-friday'}:{label:ns[d]+'요일 학습',isFri:false,cls:'badge-weekday'}}

async function load(){
  try{
    const snap = await getDoc(PROG);
    if(snap.exists()){
      const d=snap.data();
      st.done=d.done||[]; st.wrong=d.wrong||[]; st.sessions=d.sessions||{};
      st.remaining=ALL.filter(w=>!st.done.includes(w));
      if(!st.remaining.length){st.remaining=[...ALL];st.done=[]}
    } else { st.remaining=[...ALL] }
  } catch(e){ console.error(e); st.remaining=[...ALL] }
  updateUI(); startSession();
}

async function save(){
  try{ await setDoc(PROG,{done:st.done,wrong:st.wrong,sessions:st.sessions,updatedAt:new Date().toISOString()}) }
  catch(e){ console.error(e) }
}

function updateUI(){
  const total=ALL.length, done=st.done.length, pct=Math.round(done/total*100);
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statWrong').textContent=st.wrong.length;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=done+' / '+total+' 완료';
  document.getElementById('progressPct').textContent=pct+'%';
  const t=new Date(),ns=['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent=t.getFullYear()+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+String(t.getDate()).padStart(2,'0')+' '+ns[t.getDay()];
}

function startSession(){
  const di=dayInfo(); st.isFri=di.isFri;
  const badge=document.getElementById('dayBadge');
  badge.textContent=di.label; badge.className='day-badge '+di.cls;
  if(di.isFri&&st.wrong.length>0){ st.cur=shuffle(st.wrong).slice(0,20) }
  else { st.cur=shuffle(st.remaining).slice(0,Math.min(5,st.remaining.length)) }
  document.getElementById('wordChips').innerHTML=st.cur.map(w=>'<span class="chip">'+w+'</span>').join('');
  st.ans=Array(st.cur.length).fill('');
  window._ans=[...st.ans];
  document.getElementById('feedbackCard').style.display='none';
  renderSentences();
  document.getElementById('submitBtn').disabled=false;
}

function renderSentences(){
  document.getElementById('sentencesArea').innerHTML=st.cur.map((w,i)=>{
    const ko=S[w]||'(문장 준비 중)';
    return '<div class="sentence-item"><div class="s-num">'+String(i+1).padStart(2,'0')+'</div>'
      +'<div class="ko-sentence">'+ko+'</div>'
      +'<textarea id="ans'+i+'" placeholder="영어로 작성하세요..." rows="2" oninput="window._ans['+i+']=this.value"></textarea>'
      +'</div>';
  }).join('');
}

window.submitAnswers = async function(){
  st.ans = window._ans || st.ans;
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='저장 중...';

  const html=st.cur.map((w,i)=>{
    const ans=(st.ans[i]||'').trim();
    const hasWord=ans.toLowerCase().includes(w.toLowerCase().split(' ')[0]);
    const status=!ans?'no':hasWord?'ok':'check';
    const pillCls=status==='ok'?'pill-ok':status==='check'?'pill-check':'pill-no';
    const pillLabel=status==='ok'?'✓ 제출됨':status==='check'?'△ 단어 확인':'✕ 미작성';
    return '<div class="feedback-item">'
      +'<div class="feedback-header"><span class="status-pill '+pillCls+'">'+pillLabel+'</span><span class="target-word">'+w+'</span></div>'
      +'<div class="user-answer">"'+(ans||'미작성')+'"</div>'
      +'<div class="ko-hint">힌트 문장: '+S[w]+'</div>'
      +'</div>';
  }).join('');

  const key=todayKey();
  if(!st.sessions[key]) st.sessions[key]=[];
  st.sessions[key].push({words:[...st.cur], ans:[...st.ans], ts:new Date().toISOString()});

  st.cur.forEach((w,i)=>{
    const ans=(st.ans[i]||'').trim();
    const hasWord=ans.toLowerCase().includes(w.toLowerCase().split(' ')[0]);
    if(!ans||!hasWord){ if(!st.wrong.includes(w)) st.wrong.push(w) }
    else { st.wrong=st.wrong.filter(x=>x!==w) }
  });

  if(!st.isFri){
    st.cur.forEach(w=>{ if(!st.done.includes(w)) st.done.push(w); st.remaining=st.remaining.filter(x=>x!==w) });
    if(!st.remaining.length){st.remaining=[...ALL];st.done=[]}
  }

  updateUI();
  await save();

  document.getElementById('feedbackArea').innerHTML=html;
  document.getElementById('feedbackCard').style.display='block';
  document.getElementById('feedbackCard').scrollIntoView({behavior:'smooth',block:'start'});
  btn.disabled=false; btn.textContent='첨삭 받기 →';
};

window.nextSession = function(){
  document.getElementById('feedbackCard').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
  startSession();
};

window.showTab = function(tab){
  document.getElementById('tab-study').style.display=tab==='study'?'block':'none';
  document.getElementById('tab-history').style.display=tab==='history'?'block':'none';
  document.getElementById('tab-btn-study').className='tab'+(tab==='study'?' active':'');
  document.getElementById('tab-btn-history').className='tab'+(tab==='history'?' active':'');
  if(tab==='history') renderCal();
};

window.changeMonth = function(d){ calM+=d; if(calM>11){calM=0;calY++} if(calM<0){calM=11;calY--} renderCal() };

function renderCal(){
  const ms=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent=calY+'년 '+ms[calM];
  const dows=['일','월','화','수','목','금','토'];
  const first=new Date(calY,calM,1).getDay();
  const last=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  let html=dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for(let i=0;i<first;i++) html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=last;d++){
    const key=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hasSess=!!(st.sessions[key]&&st.sessions[key].length);
    const isToday=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    let cls='cal-day';
    if(hasSess) cls+=' has-session';
    if(isToday) cls+=' today';
    if(!hasSess&&!isToday) cls+=' empty';
    const onclick=hasSess ? ' onclick="showSession(''+key+'')"' : '';
    html+='<div class="'+cls+'"'+onclick+'>'+d+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
}

window.showSession = function(dateKey){
  document.getElementById('calView').style.display='none';
  const sessions=st.sessions[dateKey]||[];
  let html='<button class="back-btn" onclick="backToCal()">← 캘린더로</button>';
  sessions.forEach((sess,si)=>{
    html+='<div class="card"><div class="section-label" style="margin-bottom:12px">'+dateKey+' — '+String(si+1)+'번째 세션</div><div>';
    sess.words.forEach((w,i)=>{
      const ans=sess.ans[i]||'(미작성)';
      html+='<div class="word-row"><span class="word-en">'+w+'</span><span style="font-size:13px;color:var(--text-2);font-style:italic">'+ans+'</span></div>';
    });
    html+='</div><button class="btn-secondary" style="margin-top:1rem" onclick="relearn(''+dateKey+'','+si+')">이 세트 다시 학습 →</button></div>';
  });
  document.getElementById('sessionView').innerHTML=html;
  document.getElementById('sessionView').style.display='block';
};

window.backToCal = function(){
  document.getElementById('sessionView').style.display='none';
  document.getElementById('calView').style.display='block';
};

window.relearn = function(dateKey, si){
  const sess=st.sessions[dateKey][si];
  st.cur=[...sess.words];
  st.ans=Array(sess.words.length).fill('');
  window._ans=[...st.ans];
  showTab('study');
  const badge=document.getElementById('dayBadge');
  badge.textContent='복습 — '+dateKey; badge.className='day-badge badge-friday';
  document.getElementById('wordChips').innerHTML=sess.words.map(w=>'<span class="chip">'+w+'</span>').join('');
  document.getElementById('feedbackCard').style.display='none';
  renderSentences();
  document.getElementById('submitBtn').disabled=false;
  window.scrollTo({top:0,behavior:'smooth'});
};

load();
</script>
</body>
</html>
